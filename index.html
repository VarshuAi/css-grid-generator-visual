<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Builder — Glassmorphism Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-row">
                <span class="logo-emoji">🕸</span>
                <div class="title-col">
                    <h1>CSS Grid Builder</h1>
                    <p class="tagline">Interactive row and column builder exporting CSS Grid values.</p>
                </div>
            </div>
            <div class="badge">css</div>
        </header>

        <main class="workspace-card">
            
            <div style="display:flex; gap:12px; margin-bottom:16px;">
                <input type="number" id="grid-c" value="3" min="1" max="5" style="width:80px;">
                <button class="btn" onclick="genGrid()">Redraw Grid</button>
            </div>
            <div id="grid-canvas" style="display:grid; gap:8px; height:150px; background:#0c0c14; border-radius:12px; padding:10px;"></div>
        
        </main>
        
        <footer class="app-footer">
            <p>Created as a premium portfolio piece by <a href="https://github.com/VARSHAN69" target="_blank">@VARSHAN69</a></p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
